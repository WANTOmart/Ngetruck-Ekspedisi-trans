<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
}

button{
    padding:10px;
    background:red;
    color:white;
    border:none;
}
</style>

</head>
<body>

<script>
if(localStorage.getItem("login")!=="true"){
    location.href="login.html";
}
</script>

<div class="card">

<h2>Dashboard Ekspedisi Truk</h2>

<p>
User :
<b id="user"></b>
</p>

<p>
Role :
<b id="role"></b>
</p>

<br>

<button onclick="logout()">
Logout
</button>

</div>

<script>

document.getElementById("user").innerHTML =
localStorage.getItem("adminName");

document.getElementById("role").innerHTML =
localStorage.getItem("role");

function logout(){

    localStorage.clear();

    location.href="login.html";

}

</script>

</body>
</html>
