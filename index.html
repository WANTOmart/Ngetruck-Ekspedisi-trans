<!DOCTYPE html>
<html>
<head>

<title>Ngetruck Ekspedisi</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
}

.box{
width:350px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#0066ff;
color:white;
border:0;
}

#dashboard{
display:none;
}

</style>

</head>


<body>


<div class="box" id="login">


<h2>
🚚 LOGIN ADMIN
</h2>


<input id="user" placeholder="Username">


<input id="pass" type="password" placeholder="Password">


<button onclick="cekLogin()">
LOGIN
</button>


<p id="pesan"></p>


</div>





<div class="box" id="dashboard">


<h2>
🚚 NGETRUCK EKSPEDISI
</h2>


<p>
Selamat datang Admin:
<b id="admin"></b>
</p>


<h3>
Menu
</h3>


<p>👥 Pelanggan</p>

<p>🚚 Armada Truk</p>

<p>👨‍✈️ Supir</p>

<p>📦 Pengiriman</p>

<p>📍 Tracking Resi</p>

<p>📊 Laporan</p>


<button onclick="keluar()">
LOGOUT
</button>


</div>





<script>


function cekLogin(){


let username =
document.getElementById("user").value;


let password =
document.getElementById("pass").value;



if(username === "admin" && password === "123456"){


document.getElementById("login").style.display="none";


document.getElementById("dashboard").style.display="block";


document.getElementById("admin").innerHTML=username;


}

else{


document.getElementById("pesan").innerHTML=
"Username atau Password salah";


}


}



function keluar(){

location.reload();

}


</script>


</body>
</html>
