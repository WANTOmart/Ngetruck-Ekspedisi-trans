<!DOCTYPE html>
<html>
<head>

<title>Ngetruck Ekspedisi</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
}

.box{
width:90%;
max-width:600px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

h2{
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#0066ff;
color:white;
border:0;
cursor:pointer;
}


.menu div{

background:#0066ff;
color:white;
padding:15px;
margin:10px 0;
border-radius:8px;
text-align:center;
cursor:pointer;

}


#dashboard,
#pelanggan{

display:none;

}


table{

width:100%;
margin-top:20px;
border-collapse:collapse;

}

td,th{

border:1px solid #ccc;
padding:8px;

}

</style>


</head>


<body>


<!-- LOGIN -->

<div class="box" id="login">


<h2>
🚚 LOGIN ADMIN
</h2>


<input id="user" placeholder="Username">


<input id="pass" type="password" placeholder="Password">


<button onclick="cekLogin()">

LOGIN

</button>


<p id="pesan"></p>


</div>





<!-- DASHBOARD -->


<div class="box" id="dashboard">


<h2>
🚚 NGETRUCK EKSPEDISI
</h2>


<p>
Selamat datang Admin:
<b id="nama"></b>
</p>


<div class="menu">


<div onclick="bukaPelanggan()">
👥 Pelanggan
</div>


<div>
🚚 Armada Truk
</div>


<div>
👨‍✈️ Supir
</div>


<div>
📦 Pengiriman
</div>


<div>
📍 Tracking Resi
</div>


<div>
📊 Laporan
</div>


</div>


<br>


<button onclick="logout()">

LOGOUT

</button>


</div>







<!-- PELANGGAN -->


<div class="box" id="pelanggan">


<h2>
👥 DATA PELANGGAN
</h2>


<input id="namaP" placeholder="Nama Pelanggan">


<input id="hp" placeholder="Nomor HP">


<input id="alamat" placeholder="Alamat">


<button onclick="simpan()">

SIMPAN

</button>



<table>


<tr>

<th>Nama</th>
<th>HP</th>
<th>Alamat</th>

</tr>


<tbody id="tabel"></tbody>


</table>


<br>


<button onclick="kembali()">

Kembali

</button>


</div>







<script>


function cekLogin(){


let u =
document.getElementById("user").value;


let p =
document.getElementById("pass").value;



if(u=="admin" && p=="123456"){


document.getElementById("login").style.display="none";


document.getElementById("dashboard").style.display="block";


document.getElementById("nama").innerHTML=u;


}

else{


document.getElementById("pesan").innerHTML="Login salah";


}


}






function bukaPelanggan(){


document.getElementById("dashboard").style.display="none";


document.getElementById("pelanggan").style.display="block";


tampil();


}





function simpan(){


let data =

JSON.parse(localStorage.getItem("pelanggan")) || [];



data.push({

nama:
document.getElementById("namaP").value,

hp:
document.getElementById("hp").value,

alamat:
document.getElementById("alamat").value

});



localStorage.setItem(

"pelanggan",

JSON.stringify(data)

);



tampil();


}



function tampil(){


let data =

JSON.parse(localStorage.getItem("pelanggan")) || [];



document.getElementById("tabel").innerHTML="";



data.forEach(function(x){


document.getElementById("tabel").innerHTML += `


<tr>

<td>${x.nama}</td>

<td>${x.hp}</td>

<td>${x.alamat}</td>

</tr>


`;


});


}





function kembali(){


document.getElementById("pelanggan").style.display="none";


document.getElementById("dashboard").style.display="block";


}



function logout(){

location.reload();

}


</script>


</body>
</html>
