<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ngetruck Ekspedisi</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f4f8;
}

.box{
width:90%;
max-width:500px;
margin:50px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

h2{
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#0066ff;
color:white;
border:0;
cursor:pointer;
}

.menu div{
background:#0066ff;
color:white;
padding:15px;
margin:10px 0;
border-radius:8px;
text-align:center;
cursor:pointer;
}

#dashboard{
display:none;
}

</style>

</head>


<body>


<div class="box" id="loginPage">


<h2>
🚚 LOGIN ADMIN
</h2>


<input id="username" placeholder="Username">


<input id="password" type="password" placeholder="Password">


<button onclick="loginAdmin()">
LOGIN
</button>


<p id="pesan"></p>


</div>





<div class="box" id="dashboard">


<h2>
🚚 NGETRUCK EKSPEDISI
</h2>


<p>
Admin:
<b id="nama"></b>
</p>


<div class="menu">


<div>
👥 Data Pelanggan
</div>


<div>
🚚 Armada Truk
</div>


<div>
👨‍✈️ Supir
</div>


<div>
📦 Pengiriman
</div>


<div>
📍 Tracking Resi
</div>


<div>
📊 Laporan
</div>


</div>


<br>


<button onclick="logout()">
LOGOUT
</button>


</div>





<script>


function loginAdmin(){


let username =
document.getElementById("username").value;


let password =
document.getElementById("password").value;



if(username=="admin" && password=="123456"){


document.getElementById("loginPage").style.display="none";


document.getElementById("dashboard").style.display="block";


document.getElementById("nama").innerHTML=username;


}

else{


document.getElementById("pesan").innerHTML=
"Login salah";


}


}




function logout(){

location.reload();

}


</script>


</body>
</html>
