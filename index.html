<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<title>Ekspedisi Truk</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f1f3f6;
margin:0;
}

.login,
.dashboard,
.content{

width:90%;
max-width:1000px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px #ccc;

}


input,select{

width:100%;
padding:10px;
margin:5px 0;

}


button{

padding:10px;
background:#0066ff;
color:white;
border:0;
border-radius:5px;
cursor:pointer;

}


.menu{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;

}


.menu div{

background:#0066ff;
color:white;
padding:20px;
text-align:center;
border-radius:8px;
cursor:pointer;

}


.logout{

background:red;
width:100%;

}


table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


td,th{

border:1px solid #ddd;
padding:8px;

}


#dashboard,
#content{

display:none;

}

</style>

</head>


<body>



<div class="login" id="login">


<h2>🚚 LOGIN ADMIN</h2>


<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">


<button onclick="login()">
LOGIN
</button>


<p id="pesan"></p>


</div>







<div class="dashboard" id="dashboard">


<h2>🚚 EKSPEDISI TRUK</h2>


Admin:
<b id="nama"></b>


<br><br>


<div class="menu">


<div onclick="buka('pelanggan')">
👥 Pelanggan
</div>


<div onclick="buka('armada')">
🚚 Armada Truk
</div>


<div onclick="buka('supir')">
👨‍✈️ Supir
</div>


<div onclick="buka('pengiriman')">
📦 Pengiriman
</div>


<div onclick="buka('tracking')">
📍 Tracking Resi
</div>


<div onclick="buka('laporan')">
📊 Laporan
</div>


</div>


<br>

<button class="logout" onclick="logout()">
Logout
</button>


</div>







<div class="content" id="content">


<h2 id="judul"></h2>


<div id="form"></div>


<table>


<thead>

<tr>

<th>Data</th>
<th>Aksi</th>

</tr>

</thead>


<tbody id="tabel"></tbody>


</table>


<br>

<button onclick="kembali()">
⬅ Kembali
</button>


</div>






<script>


let jenis="";



function login(){


if(user.value=="admin" && pass.value=="123456"){


login.style.display="none";

dashboard.style.display="block";

nama.innerHTML=user.value;


}else{

pesan.innerHTML="Login salah";

}

}





function buka(menu){


jenis=menu;


dashboard.style.display="none";

content.style.display="block";


judul.innerHTML=menu.toUpperCase();


let h="";



if(menu=="pelanggan"){


h=`

<input id="a" placeholder="Nama Pelanggan">

<input id="b" placeholder="No HP">

<input id="c" placeholder="Alamat">

<button onclick="simpan()">
Simpan
</button>

`;

}



if(menu=="armada"){


h=`

<input id="a" placeholder="Nomor Polisi">

<input id="b" placeholder="Jenis Truk">

<input id="c" placeholder="Status">

<button onclick="simpan()">
Simpan
</button>

`;

}





if(menu=="supir"){


h=`

<input id="a" placeholder="Nama Supir">

<input id="b" placeholder="No HP">


<button onclick="simpan()">
Simpan
</button>

`;

}





if(menu=="pengiriman"){


h=`

<input id="a" placeholder="Nomor Resi">


<input id="b" placeholder="Tujuan">


<input id="c" placeholder="Status (Dalam perjalanan)">


<button onclick="simpan()">
Simpan
</button>

`;

}





if(menu=="tracking"){


h=`

<input id="a" placeholder="Masukkan Resi">


<button onclick="tracking()">
Cari
</button>


<p id="hasil"></p>

`;

}




if(menu=="laporan"){


let p=data("pelanggan");

let t=data("armada");

let s=data("supir");

let k=data("pengiriman");



h=`

<h3>
📊 Statistik
</h3>

<p>Pelanggan : ${p.length}</p>

<p>Armada : ${t.length}</p>

<p>Supir : ${s.length}</p>

<p>Pengiriman : ${k.length}</p>


`;

}



form.innerHTML=h;


tampil();


}




function simpan(){


let arr=data(jenis);


let isi=a.value;


if(b) isi+=" | "+b.value;

if(c) isi+=" | "+c.value;


arr.push(isi);


localStorage.setItem(jenis,JSON.stringify(arr));


tampil();


}





function data(n){


return JSON.parse(localStorage.getItem(n)) || [];

}





function tampil(){


tabel.innerHTML="";


data(jenis).forEach((x,i)=>{


tabel.innerHTML+=`

<tr>

<td>${x}</td>


<td>

<button onclick="hapus(${i})">
Hapus
</button>

</td>


</tr>


`;

});


}




function hapus(i){


let arr=data(jenis);


arr.splice(i,1);


localStorage.setItem(jenis,JSON.stringify(arr));


tampil();

}





function tracking(){


let cari=a.value;


let hasil="Tidak ditemukan";


data("pengiriman").forEach(x=>{


if(x.includes(cari)){


hasil="📦 "+x;


}


});


document.getElementById("hasil").innerHTML=hasil;


}





function kembali(){


content.style.display="none";

dashboard.style.display="block";

}



function logout(){

dashboard.style.display="none";

login.style.display="block";

}


</script>


</body>
</html>
