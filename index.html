<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ngetruck Ekspedisi</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f4f8;
}

.box{
width:90%;
max-width:500px;
margin:50px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

h2{
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#0066ff;
color:white;
border:0;
cursor:pointer;
}

.menu div{
background:#0066ff;
color:white;
padding:15px;
margin:10px 0;
border-radius:8px;
text-align:center;
cursor:pointer;
}

#dashboard,
#halamanPelanggan{
display:none;
}

.logout{
background:red;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

</style>

</head>


<body>


<!-- LOGIN -->

<div class="box" id="halamanLogin">

<h2>🚚 LOGIN ADMIN</h2>


<input id="username" placeholder="Username">


<input id="password" type="password" placeholder="Password">


<button onclick="prosesLogin()">
LOGIN
</button>


<p id="pesan"></p>

</div>





<!-- DASHBOARD -->


<div class="box" id="dashboard">


<h2>
🚚 NGETRUCK EKSPEDISI
</h2>


<p>
Admin :
<b id="namaAdmin"></b>
</p>



<div class="menu">


<div onclick="bukaPelanggan()">
👥 Data Pelanggan
</div>


<div>
🚚 Armada Truk
</div>


<div>
👨‍✈️ Supir
</div>


<div>
📦 Pengiriman
</div>


<div>
📍 Tracking Resi
</div>


<div>
📊 Laporan
</div>


</div>


<button class="logout" onclick="logout()">

Logout

</button>


</div>






<!-- PELANGGAN -->


<div class="box" id="halamanPelanggan">


<h2>
👥 DATA PELANGGAN
</h2>


<input id="namaPelanggan" placeholder="Nama Pelanggan">


<input id="nomorHP" placeholder="Nomor HP">


<input id="alamat" placeholder="Alamat">


<button onclick="simpanPelanggan()">

Simpan

</button>



<table>


<tr>

<th>Nama</th>
<th>HP</th>
<th>Alamat</th>
<th>Aksi</th>

</tr>


<tbody id="tabelPelanggan">

</tbody>


</table>



<br>


<button onclick="kembaliDashboard()">

Kembali

</button>


</div>






<script>


function prosesLogin(){


let user =
document.getElementById("username").value;


let pass =
document.getElementById("password").value;



if(user=="admin" && pass=="123456"){


document.getElementById("halamanLogin")
.style.display="none";


document.getElementById("dashboard")
.style.display="block";


document.getElementById("namaAdmin")
.innerHTML=user;


}

else{


document.getElementById("pesan")
.innerHTML="Login salah";


}


}





function bukaPelanggan(){


document.getElementById("dashboard")
.style.display="none";


document.getElementById("halamanPelanggan")
.style.display="block";


tampilPelanggan();


}





function simpanPelanggan(){


let data =
JSON.parse(localStorage.getItem("pelanggan")) || [];



data.push({

nama:
document.getElementById("namaPelanggan").value,

hp:
document.getElementById("nomorHP").value,

alamat:
document.getElementById("alamat").value

});



localStorage.setItem(

"pelanggan",

JSON.stringify(data)

);



tampilPelanggan();


}



function tampilPelanggan(){


let data =
JSON.parse(localStorage.getItem("pelanggan")) || [];



let tabel =
document.getElementById("tabelPelanggan");


tabel.innerHTML="";



data.forEach(function(item,index){


tabel.innerHTML += `


<tr>

<td>${item.nama}</td>

<td>${item.hp}</td>

<td>${item.alamat}</td>


<td>

<button onclick="hapusPelanggan(${index})">

X

</button>

</td>


</tr>


`;


});


}




function hapusPelanggan(index){


let data =
JSON.parse(localStorage.getItem("pelanggan"));


data.splice(index,1);



localStorage.setItem(

"pelanggan",

JSON.stringify(data)

);



tampilPelanggan();


}





function kembaliDashboard(){


document.getElementById("halamanPelanggan")
.style.display="none";


document.getElementById("dashboard")
.style.display="block";


}





function logout(){

location.reload();

}


</script>


</body>
</html>
