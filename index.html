<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ngetruck Ekspedisi</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f4f8;
}


.box{
width:90%;
max-width:500px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}


h2{
text-align:center;
}


input,button{

width:100%;
padding:12px;
margin-top:10px;

}


button{

background:#0066ff;
color:white;
border:0;
cursor:pointer;

}


.menu div{

background:#0066ff;
color:white;
padding:15px;
margin:10px 0;
border-radius:8px;
text-align:center;
cursor:pointer;

}


.logout{

background:red;

}


#dashboard,
#pelanggan{

display:none;

}


table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


td,th{

border:1px solid #ccc;
padding:8px;

}


.hapus{

background:red;
padding:5px;

}

</style>

</head>


<body>


<!-- LOGIN -->

<div class="box" id="login">


<h2>
🚚 LOGIN ADMIN
</h2>


<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">


<button onclick="login()">
LOGIN
</button>


<p id="pesan"></p>


</div>





<!-- DASHBOARD -->

<div class="box" id="dashboard">


<h2>
🚚 NGETRUCK EKSPEDISI
</h2>


<p>
Admin:
<b id="nama"></b>
</p>


<div class="menu">


<div onclick="bukaPelanggan()">
👥 Data Pelanggan
</div>


<div>
🚚 Armada Truk
</div>


<div>
👨‍✈️ Supir
</div>


<div>
📦 Pengiriman
</div>


<div>
📍 Tracking Resi
</div>


</div>


<button class="logout" onclick="logout()">
Logout
</button>


</div>






<!-- PELANGGAN -->


<div class="box" id="pelanggan">


<h2>
👥 DATA PELANGGAN
</h2>


<input id="namaPelanggan"
placeholder="Nama Pelanggan">


<input id="hp"
placeholder="No HP">


<input id="alamat"
placeholder="Alamat">


<button onclick="simpanPelanggan()">

Simpan

</button>


<table>


<thead>

<tr>

<th>Nama</th>
<th>HP</th>
<th>Alamat</th>
<th>Aksi</th>

</tr>

</thead>


<tbody id="dataPelanggan">


</tbody>


</table>


<br>


<button onclick="kembali()">

Kembali

</button>


</div>







<script>


function login(){


let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;


if(u=="admin" && p=="123456"){


login.style.display="none";

dashboard.style.display="block";

nama.innerHTML=u;


}else{

pesan.innerHTML="Login salah";

}

}





function bukaPelanggan(){


dashboard.style.display="none";

pelanggan.style.display="block";

tampilPelanggan();


}





function simpanPelanggan(){


let data =
JSON.parse(localStorage.getItem("pelanggan")) || [];


data.push({

nama:namaPelanggan.value,

hp:hp.value,

alamat:alamat.value

});


localStorage.setItem(

"pelanggan",

JSON.stringify(data)

);


namaPelanggan.value="";
hp.value="";
alamat.value="";


tampilPelanggan();


}





function tampilPelanggan(){


let data =
JSON.parse(localStorage.getItem("pelanggan")) || [];


dataPelanggan.innerHTML="";


data.forEach((p,index)=>{


dataPelanggan.innerHTML += `

<tr>

<td>${p.nama}</td>

<td>${p.hp}</td>

<td>${p.alamat}</td>

<td>

<button class="hapus"
onclick="hapus(${index})">

X

</button>

</td>

</tr>

`;

});


}





function hapus(i){


let data =
JSON.parse(localStorage.getItem("pelanggan"));


data.splice(i,1);


localStorage.setItem(

"pelanggan",

JSON.stringify(data)

);


tampilPelanggan();


}





function kembali(){


pelanggan.style.display="none";

dashboard.style.display="block";


}





function logout(){

location.reload();

}


</script>


</body>
</html>
