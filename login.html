<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin Ekspedisi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#fff;
    width:350px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

#pesan{
    text-align:center;
    color:red;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="login-box">

<h2>🚚 Login Admin</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p id="pesan"></p>

</div>

<script>

// Membuat user default jika belum ada
if(!localStorage.getItem("users")){
    const users = [
        {
            username:"admin",
            password:"123456",
            role:"Admin"
        }
    ];

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );
}

function login(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    const users =
    JSON.parse(localStorage.getItem("users"));

    const user =
    users.find(u =>
        u.username === username &&
        u.password === password
    );

    if(user){

        localStorage.setItem("login","true");
        localStorage.setItem("adminName",user.username);
        localStorage.setItem("role",user.role);

        alert("Login Berhasil");

        window.location.href="dashboard.html";

    }else{

        document.getElementById("pesan")
        .innerHTML =
        "Username atau Password Salah";

    }

}

</script>

</body>
</html>
